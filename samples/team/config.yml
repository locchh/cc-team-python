# Team Configuration
team:
  name: "Demo Team"
  description: "A demonstration team of AI agents"

# Agent configurations
agents:
  tom:
    host: localhost
    port: 8001
    description: "Tom - The technical specialist who handles coding and system architecture"
    model: claude-haiku-4-5-20251001
  
  jerry:
    host: localhost
    port: 8002
    description: "Jerry - The research analyst who gathers information and provides insights"
    model: claude-haiku-4-5-20251001
  
  alice:
    host: localhost
    port: 8003
    description: "Alice - The project manager who coordinates team efforts and ensures smooth workflow"

# Global settings
settings:
  default_host: localhost
  base_port: 8001
  auto_increment_ports: true
  # Default model for all agents (per-agent model overrides this)
  # Available models:
  #   claude-haiku-4-5-20251001   (fastest, lowest cost)
  #   claude-sonnet-4-6           (balanced)
  #   claude-opus-4-6             (most capable)
  model: claude-sonnet-4-6
